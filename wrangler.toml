name = "sprint-planning"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# Optional: set these to enable full room listing via Cloudflare REST API.
# CF_API_TOKEN must be set as a secret: wrangler secret put CF_API_TOKEN
# Get ROOMS_NAMESPACE_ID from: Cloudflare dashboard → Workers → Durable Objects → sprint-planning_RoomDO
[vars]
CF_ACCOUNT_ID = ""
ROOMS_NAMESPACE_ID = ""
CF_API_TOKEN = ""

[assets]
directory = "./frontend/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

[[durable_objects.bindings]]
name = "ADMIN"
class_name = "AdminDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["AdminDO"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
